<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <h1 align="center">ONLINE FEEDBACK FORM</h1>
    <hr>

    <form method="post" action="submit.html">

        <p>
            <label for="text">Full Name:</label>
            <input type="text" id="text" name="fullname" placeholder="Enter your full name" required>
        </p>

        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter valid email address" required>
        </p>

        <p>
            <label>Rating :</label><br></p>
            <p>
            <input type="radio" name="rating" value="1" required> 1. Strongly Disagree<br>
            <input type="radio" name="rating" value="2"> 2. Disagree<br>
            <input type="radio" name="rating" value="3" required> 3. Neutral <br>
            <input type="radio" name="rating" value="4" required> 4. Agree<br>
            <input type="radio" name="rating" value="5" required> 5. Strongly Agree<br>
        </p>
        <p>
            <label for="address">Comments:</label><br>
            <textarea name="address" id="address"rows="4" cols="40" placeholder="Enter your address"></textarea>
        </p>

        <p>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">
        </p>

    </form>

    <hr>
    <footer align="center">
        &copy; 2026 Feedback Form 
    </footer>

</body>
</html>
